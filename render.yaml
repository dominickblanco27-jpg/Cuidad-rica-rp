services:
  - type: worker
    name: discord-bot
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install
    startCommand: node artifacts/discord-bot/src/deploy-commands.js && node artifacts/discord-bot/src/index.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
